  <div class="container">
    <div id="login" class="form" style="display: none;">
      <h1>Login</h1>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <button onclick="goBack()">Back</button>
    </div>
    <div id="register" class="form" style="display: none;">
      <h1>Register</h1>
      <input type="text" id="reg-username" placeholder="Username">
      <input type="password" id="reg-password" placeholder="Password">
      <input type="email" id="reg-email" placeholder="Email">
      <button onclick="register()">Register</button>
      <button onclick="goBack()">Back</button>
    </div>
    <div id="admin" class="form" style="display: none;">
      <h1>Admin Login</h1>
      <input type="text" id="admin-username" placeholder="Username">
      <input type="password" id="admin-password" placeholder="Password">
      <button onclick="adminLogin()">Login</button>
      <button onclick="goBack()">Back</button>
    </div>
    <div id="admin-dashboard" class="form" style="display: none;">
      <h1>Admin Dashboard</h1>
      <button onclick="addQuestion()">Add Question</button>
      <button onclick="manageTests()">Manage Tests</button>
      <button onclick="viewStudents()">View Students</button>
      <button onclick="goBack()">Back</button>
    </div>
  </div>

  <script type="module">

    const firebaseConfig = {
      apiKey: "AIzaSyBDPdbSyP8WD70CCPwbMA9sPtOK9XLejbQ",

    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    let currentUser = null;
    let currentPage = 'login';

    function showPage(page) {
      document.getElementById('login').style.display = 'none';
      document.getElementById('register').style.display = 'none';
      document.getElementById('admin').style.display = 'none';
      document.getElementById('admin-dashboard').style.display = 'none';
      document.getElementById(page).style.display = 'block';
      currentPage = page;
    }

    function goBack() {
      window.history.back();
    }

    function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      signInWithEmailAndPassword(auth, username, password)
        .then((userCredential) => {
          currentUser = userCredential.user;
          showPage('student-dashboard');
        })
        .catch((error) => {
          console.error(error);
        });
    }

    function register() {
      const username = document.getElementById('reg-username').value;
      const password = document.getElementById('reg-password').value;
      const email = document.getElementById('reg-email').value;
      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          currentUser = userCredential.user;
          set(ref(database, 'users/' + currentUser.uid), {
            username: username,
            email: email
          });
          showPage('student-dashboard');
        })
        .catch((error) => {
          console.error(error);
        });
    }

    function adminLogin() {
      const username = document.getElementById('admin-username').value;
      const password = document.getElementById('admin-password').value;
      if (username === 'admin' && password === 'Sachin@123') {

      } else {
        alert('Invalid username or password');

    }
